<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Finance Dashboard</h1>

<!-- Role Switch (Static UI) -->
<div class="role">
  <label>Select Role:</label>
  <select>
    <option>Viewer</option>
    <option>Admin</option>
  </select>
</div>

<!-- Summary Cards -->
<div class="summary">
  <div class="card income">Income ₹6000</div>
  <div class="card expense">Expense ₹500</div>
  <div class="card balance">Balance ₹5500</div>
</div>
<!-- Category Visualization -->
<div class="section">
  <h2>Spending Breakdown</h2>
  <div class="pie">
    <div class="slice food">Food</div>
    <div class="slice travel">Travel</div>
    <div class="slice other">Other</div>
  </div>
</div>

<!-- Filter + Search UI -->
<div class="controls">
  <input type="text" placeholder="Search transactions...">
  <select>
    <option>All</option>
    <option>Income</option>
    <option>Expense</option>
  </select>
  <select>
    <option>Sort by Date</option>
    <option>Sort by Amount</option>
  </select>
</div>

<!-- Transactions Table -->
<div class="section">
  <h2>Transactions</h2>
  <table>
    <tr>
      <th>Date</th>
      <th>Amount</th>
      <th>Category</th>
      <th>Type</th>
    </tr>
    <tr>
      <td>01-04-2026</td>
      <td>₹5000</td>
      <td>Salary</td>
      <td>Income</td>
    </tr>
    <tr>
      <td>02-04-2026</td>
      <td>₹200</td>
      <td>Food</td>
      <td>Expense</td>
    </tr>
  </table>
</div>

<!-- Insights -->
<div class="section">
  <h2>Insights</h2>
  <p>Highest spending: Food</p>
  <p>Stable income growth</p>
</div>

</body>
</html>
